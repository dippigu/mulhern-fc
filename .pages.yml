media:
  input: public/uploads
  output: /uploads

content:
  - name: testimonials
    label: Testimonials
    type: collection
    path: src/content/testimonials
    format: yaml-frontmatter
    view:
      fields: [name, role, order]
      sort: [order]
      default:
        sort: order
        order: asc
    filename:
      template: '{name}.md'
    fields:
      - name: name
        label: Name
        type: string
        required: true
      - name: role
        label: Role or location
        type: string
        required: true
        description: 'e.g. "Durham, UK" or "UEFA A Licence Coach"'
      - name: order
        label: Display order
        type: number
        required: true
        description: 'Lower numbers appear first'
      - name: body
        label: Quote
        type: rich-text
        required: true

  - name: awards
    label: Awards
    type: collection
    path: src/content/awards
    format: json
    view:
      fields: [title, years, order]
      sort: [order]
      default:
        sort: order
        order: asc
    filename:
      template: '{title}.json'
    fields:
      - name: title
        label: Award title
        type: string
        required: true
      - name: blurb
        label: Description
        type: text
        required: true
      - name: years
        label: Years awarded
        type: string
        required: true
        description: 'e.g. "2009, 2011, 2013"'
      - name: order
        label: Display order
        type: number
        required: true

  - name: pages
    label: Pages
    type: collection
    path: src/content/pages
    format: yaml-frontmatter
    view:
      fields: [title, breadcrumb]
    filename:
      template: '{title}.md'
      field: false
    fields:
      - name: breadcrumb
        label: Section label (small text above title)
        type: string
        required: true
      - name: title
        label: Page title
        type: string
        required: true
      - name: lead
        label: Lead paragraph
        type: text
        required: true
      - name: tags
        label: Tag pills
        type: string
        list: true
      - name: partnership
        label: Partnership callout (optional)
        type: text
        description: 'Highlighted box near the top of the page. Leave blank to hide.'
      - name: body
        label: About-the-workshops body
        type: rich-text
        required: true
      - name: features
        label: About-the-workshops feature points
        type: object
        list: true
        fields:
          - { name: title, label: Title, type: string, required: true }
          - { name: body, label: Body, type: text, required: true }
      - name: topics
        label: Workshop topics
        type: object
        list: true
        fields:
          - { name: title, label: Title, type: string, required: true }
          - { name: body, label: Body, type: text, required: true }
      - name: formats
        label: Format & delivery options
        type: object
        list: true
        fields:
          - { name: title, label: Title, type: string, required: true }
          - { name: body, label: Body, type: text, required: true }
      - name: audiences
        label: Target audiences
        type: object
        list: true
        fields:
          - { name: title, label: Title, type: string, required: true }
          - { name: body, label: Body, type: text, required: true }
      - name: ctaHeading
        label: Call-to-action heading
        type: string
        required: true
      - name: ctaBody
        label: Call-to-action body
        type: text
        required: true

  - name: site-settings
    label: Site settings
    type: file
    path: src/data/site.json
    format: json
    fields:
      - name: profileImage
        label: Profile photo
        type: image
        description: 'Used in the header logo and on the About page'
      - name: heroImage
        label: Home page hero background
        type: image
      - name: ogImage
        label: Social share image
        type: image
        description: 'Shown when the site is shared on social media'
